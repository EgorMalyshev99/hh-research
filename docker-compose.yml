services:
  postgres:
    image: postgres:17-alpine
    container_name: hh-research-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: hh-research-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      PORT: ${API_PORT}
      NODE_ENV: ${API_NODE_ENV}
      FRONTEND_URL: ${FRONTEND_URL}
      LLM_REQUEST_TIMEOUT_MS: ${LLM_REQUEST_TIMEOUT_MS}
      GEMINI_API_BASE: ${GEMINI_API_BASE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_BASE: ${OPENROUTER_API_BASE}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER}
      GROQ_API_BASE: ${GROQ_API_BASE}
      GROQ_API_KEY: ${GROQ_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ERRORS_CHAT_ID: ${TELEGRAM_ERRORS_CHAT_ID}
      TELEGRAM_VACANCY_DIGEST_LIMIT: ${TELEGRAM_VACANCY_DIGEST_LIMIT}
    ports:
      - "${API_PORT}:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: hh-research-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:80"

volumes:
  pgdata:
